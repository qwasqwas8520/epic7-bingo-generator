<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公會賓果產生器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>海釣場靠賽賓果</h1>
    <p>點擊賓果格子，搜尋並選擇你想要的光/暗五星角色，填滿後即可生成圖片。</p>

    <div class="main-container">
        <!-- 左側：已選擇的角色列表 -->
        <div class="side-panel" id="selected-characters-panel">
            <h2>已選角色 (<span>0</span>/24)</h2> 無限
            <ul id="selected-list"></ul>
        </div>

        <!-- 中間：賓果盤 -->
        <div id="bingo-container">
            <div id="bingo-card"></div>
            <button id="generate-btn">生成賓果卡圖片</button>
        </div>

        <!-- 右側：所有角色列表 -->
        <div class="side-panel" id="all-characters-panel">
            <h2>光暗5星角色列表</h2>
            <ul id="character-list"></ul>
        </div>
    </div>

    <!-- 用於顯示生成圖片的彈出視窗 -->
    <div id="image-modal" class="modal">
        <span class="close-btn">&times;</span>
        <div class="modal-content">
            <p class="modal-instruction">右鍵點擊圖片，選擇「複製圖片」即可貼到 Discord！</p>
            <img id="generated-image" src="" alt="Generated Bingo Card">
        </div>
    </div>

    <!-- 引入 html2canvas 函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入您的 JavaScript 邏輯 -->
    <script src="script.js"></script>
</body>
</html>
